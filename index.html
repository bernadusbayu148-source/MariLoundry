<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MariLoundry | Kasir POS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0056b3; --accent: #25d366; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #333; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        button:hover { filter: brightness(0.9); }
    </style>
</head>
<body>

<div class="card">
    <h2><i class="fas fa-tshirt"></i> MariLoundry POS</h2>
    <div class="form-group">
        <label>Nama Pelanggan</label>
        <input type="text" id="nama" placeholder="Masukkan nama pelanggan">
    </div>
    <div class="form-group">
        <label>Layanan</label>
        <select id="layanan">
            <option value="7000|Cuci Lipat">Cuci Lipat Reguler (Rp7.000/kg)</option>
            <option value="8000|Cuci Setrika">Cuci Setrika Reguler (Rp8.000/kg)</option>
        </select>
    </div>
    <div class="form-group">
        <label>Berat (KG)</label>
        <input type="number" id="berat" placeholder="0.0">
    </div>
    <button onclick="kirimWhatsApp()"><i class="fab fa-whatsapp"></i> Buat Nota & Kirim WA</button>
</div>

<script src="js/script.js"></script>
</body>
</html>
