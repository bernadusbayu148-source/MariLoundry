<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MariLoundry POS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        
        /* Navbar */
        .navbar { background: #0056b3; padding: 15px; color: white; display: flex; gap: 20px; justify-content: center; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; padding: 5px 10px; border-radius: 4px; }
        .navbar a:hover { background: #004494; }

        /* Card */
        .container { max-width: 600px; margin: 30px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .btn-wa { background: #25d366; }
        .btn-add { background: #0056b3; margin-top: 10px; }
    </style>
</head>
<body>

<!-- Navbar Navigasi -->
<div class="navbar">
    <a href="index.html">Kasir</a>
    <a href="proses.html">Orderan Masuk</a>
    <a href="selesai.html">Selesai</a>
</div>

<div class="container">
    <h2><i class="fas fa-tshirt"></i> Input Order Baru</h2>
    
    <div class="form-group">
        <label>Nama Pelanggan</label>
        <input type="text" id="nama" placeholder="Nama lengkap">
    </div>
    
    <div class="form-group">
        <label>Layanan</label>
        <select id="layanan">
            <option value="7000|Cuci Lipat">Cuci Lipat Reguler (Rp7.000/kg)</option>
            <option value="8000|Cuci Setrika">Cuci Setrika Reguler (Rp8.000/kg)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Berat (KG)</label>
        <input type="number" id="berat" placeholder="0.0">
    </div>

    <button class="btn btn-wa" onclick="kirimWhatsApp()">Buat Nota & Kirim WA</button>
</div>

<script src="js/script.js"></script>
</body>
</html>
